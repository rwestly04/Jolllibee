<!DOCTYPE html>
<html>
<head>
    <title>Jollibee - Drinks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="jollibee.png" class="logo">
    <h1>Jollibee</h1>
    <nav>
        <a href="index.html">Main Course</a>
        <a href="drinks.html">Drinks</a>
        <a href="dessert.html">Dessert</a>
    </nav>
</header>

<section class="menu">
    <h2>Drinks Menu</h2>

    <div class="item">
        <img src="coke.jpg">
        <div class="details">
            <span>Coke - ₱50</span>
            <input type="number" id="drink1" min="0" value="0">
        </div>
    </div>

    <div class="item">
        <img src="pineapple.jpg">
        <div class="details">
            <span>PineappleJuice - ₱60</span>
            <input type="number" id="drink2" min="0" value="0">
        </div>
    </div>

    <div class="item">
        <img src="tea.jpg">
        <div class="details">
            <span>Iced Tea - ₱45</span>
            <input type="number" id="drink3" min="0" value="0">
        </div>
    </div>

     <hr>

    <label>Enter Age:</label>
    <input type="number" id="age" min="0">

    <button onclick="computeDrinks()">Compute Total</button>

   <div class="result">
        <p>Original Total: ₱ <span id="drinkTotal">0.00</span></p>
        <p>Discount (12% Senior): ₱ <span id="discount">0.00</span></p>
        <p class="final">Final Payable: ₱ <span id="finalTotal">0.00</span></p>
    </div>
</section>

<script src="script.js"></script>
</body>

</html>
